<section id="skills" class="relative overflow-hidden py-24 bg-transparent">
    <!-- Decorative Elements (Theme Match) -->
    <div class="absolute -left-20 top-20 w-80 h-80 rounded-full bg-purple-100/40 blur-[100px] pointer-events-none animate-pulse"></div>
    <div class="absolute -right-20 bottom-0 w-80 h-80 rounded-full bg-indigo-100/30 blur-[100px] pointer-events-none"></div>

    <div class="max-w-7xl mx-auto px-6 lg:px-8 relative z-10">
        
        <!-- Heading (Serif Font + Gradient) -->
        <div class="text-center mb-20 reveal">
            <h2 class="text-4xl md:text-5xl font-serif font-bold text-slate-900 tracking-tight">
                Technical <span class="text-gradient italic">Skills</span>
            </h2>
            <div class="w-20 h-1.5 bg-indigo-600 rounded-full mx-auto mt-4"></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-start">
            
            <!-- Left Side: Front-End (Progress Bars) -->
            <div class="reveal">
                <h3 class="text-2xl font-serif font-bold mb-10 flex items-center text-slate-900">
                    <span class="w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center mr-4 text-indigo-600 shadow-sm border border-indigo-100">
                        <i class="fa-solid fa-code"></i>
                    </span>
                    Front-End Development
                </h3>
                
                <div class="space-y-8">
                    <!-- HTML/CSS Bar -->
                    <div class="group">
                        <div class="flex justify-between mb-3 text-sm font-bold uppercase tracking-wider text-slate-500">
                            <span>HTML5 / CSS3</span>
                            <span class="text-indigo-600">90%</span>
                        </div>
                        <div class="w-full bg-white rounded-full h-3 overflow-hidden shadow-sm border border-slate-100">
                            <div class="h-full rounded-full bg-gradient-to-r from-indigo-500 to-purple-500 shadow-[0_0_15px_rgba(99,102,241,0.4)] transition-all duration-1000" style="width: 90%"></div>
                        </div>
                    </div>

                    <!-- JavaScript Bar -->
                    <div class="group">
                        <div class="flex justify-between mb-3 text-sm font-bold uppercase tracking-wider text-slate-500">
                            <span>JavaScript (ES6+)</span>
                            <span class="text-indigo-600">75%</span>
                        </div>
                        <div class="w-full bg-white rounded-full h-3 overflow-hidden shadow-sm border border-slate-100">
                            <div class="h-full rounded-full bg-gradient-to-r from-indigo-500 to-purple-500 shadow-[0_0_15px_rgba(99,102,241,0.4)] transition-all duration-1000" style="width: 75%"></div>
                        </div>
                    </div>

                    <!-- Tailwind CSS Bar -->
                    <div class="group">
                        <div class="flex justify-between mb-3 text-sm font-bold uppercase tracking-wider text-slate-500">
                            <span>Tailwind CSS</span>
                            <span class="text-indigo-600">90%</span>
                        </div>
                        <div class="w-full bg-white rounded-full h-3 overflow-hidden shadow-sm border border-slate-100">
                            <div class="h-full rounded-full bg-gradient-to-r from-indigo-500 to-purple-500 shadow-[0_0_15px_rgba(99,102,241,0.4)] transition-all duration-1000" style="width: 90%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Side: Core & Tools (Cards) -->
            <div class="reveal">
                <h3 class="text-2xl font-serif font-bold mb-10 flex items-center text-slate-900">
                    <span class="w-12 h-12 bg-purple-50 rounded-xl flex items-center justify-center mr-4 text-purple-600 shadow-sm border border-purple-100">
                        <i class="fa-solid fa-layer-group"></i>
                    </span>
                    Core & Tools
                </h3>

                <div class="grid grid-cols-2 gap-5">
                    
                    <!-- C++ Card -->
                    <div class="group p-6 bg-white rounded-3xl border border-slate-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 text-center relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-1 bg-primary scale-x-0 group-hover:scale-x-100 transition-transform duration-500 origin-left"></div>
                        <i class="fa-brands fa-cuttlefish text-4xl text-indigo-500 mb-4 block group-hover:scale-110 transition-transform"></i>
                        <p class="font-bold text-slate-800">C++</p>
                    </div>

                    <!-- DSA Card -->
                    <div class="group p-6 bg-white rounded-3xl border border-slate-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 text-center relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-1 bg-primary scale-x-0 group-hover:scale-x-100 transition-transform duration-500 origin-left"></div>
                        <i class="fa-solid fa-database text-4xl text-indigo-500 mb-4 block group-hover:bounce-custom"></i>
                        <p class="font-bold text-slate-800">DSA</p>
                        <span class="text-[9px] uppercase font-black text-slate-400">Logic & Structs</span>
                    </div>

                    <!-- GitHub Card -->
                    <div class="group p-6 bg-white rounded-3xl border border-slate-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 text-center relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-1 bg-primary scale-x-0 group-hover:scale-x-100 transition-transform duration-500 origin-left"></div>
                        <i class="fa-brands fa-github text-4xl text-indigo-500 mb-4 block group-hover:rotate-12 transition-transform"></i>
                        <p class="font-bold text-slate-800">GitHub</p>
                    </div>

                    <!-- VS Code Card -->
                     <div class="group p-6 bg-white rounded-3xl border border-slate-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 text-center relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-1 bg-primary scale-x-0 group-hover:scale-x-100 transition-transform duration-500 origin-left"></div>
                        <i class="fa-solid fa-laptop-code text-4xl text-indigo-500 mb-4 block group-hover:scale-110 transition-transform"></i>
                        <p class="font-bold text-slate-800">VS Code</p>
                    </div>
                   <!-- OOP -->
                    <div class="group col-span-2 p-6 bg-white rounded-3xl border border-slate-100 shadow-sm hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 text-center relative overflow-hidden flex items-center justify-around">
                        <div class="absolute top-0 left-0 w-full h-1 bg-primary scale-x-0 group-hover:scale-x-100 transition-transform duration-500 origin-left"></div>
                        <div class="flex flex-col items-center">
                            <i class="fa-solid fa-shapes text-4xl text-indigo-500 mb-2 block group-hover:rotate-45 transition-transform duration-700"></i>
                            <p class="font-bold text-slate-800">Object Oriented Programming</p>
                        </div>
                        <span class="text-[10px] uppercase font-black text-slate-400 max-w-[100px] text-left hidden sm:block">Abstraction, Inheritance, Encapsulation</span>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>
